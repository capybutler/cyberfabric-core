# Usage-collector e2e test server configuration template.
#
# Placeholder markers replaced by conftest.py config_patch at test startup:
#   __PORT__          - HTTP server listen port (both instances)
#   __DB_URL__        - TimescaleDB connection URL (gateway instance only)
#   __COLLECTOR_URL__ - Remote usage-collector base URL (emitter instance only)

server:
  home_dir: "~/.hyperspot"

database:
  servers:
    sqlite_users:
      engine: "sqlite"
      params:
        WAL: "true"
        synchronous: "NORMAL"
        busy_timeout: "5000"
      pool:
        max_conns: 1
        acquire_timeout: "30s"

logging:
  default:
    console_level: info

modules:
  api-gateway:
    config:
      bind_addr: "127.0.0.1:__PORT__"
      prefix_path: "/cf"
      enable_docs: true
      cors_enabled: false
      auth_disabled: true

  module-orchestrator:
    config: {}

  grpc-hub:
    config:
      # Unique socket path per port avoids conflicts when both instances run together.
      listen_addr: "uds:///tmp/hyperspot-grpc-uc-__PORT__"

  authn-resolver:
    config:
      vendor: "hyperspot"

  authz-resolver:
    config:
      vendor: "hyperspot"

  static-authn-plugin:
    config:
      vendor: "hyperspot"
      priority: 100
      mode: accept_all
      s2s_credentials:
        - client_id: "usage-collector-e2e"
          client_secret: "e2e-secret"

  static-authz-plugin:
    config:
      vendor: "hyperspot"
      priority: 100

  tenant-resolver:
    config:
      vendor: "hyperspot"

  single-tenant-tr-plugin:
    config: {}

  usage-collector:
    database:
      server: "sqlite_users"
      file: "usage_collector.db"
    config:
      vendor: "virtuozzo"
      plugin_timeout: "5s"
      circuit_breaker_failure_threshold: 5
      circuit_breaker_window: "10s"
      circuit_breaker_recovery_timeout: "30s"
      metrics:
        e2e.gauge:
          kind: gauge
        e2e.counter:
          kind: counter

  # Gateway instance: uses the TimescaleDB storage plugin.
  # Emitter instance: this section is present but the module is not compiled in
  # for the emitter binary (usage-collector-rest-client feature replaces it).
  timescaledb-usage-collector-storage-plugin:
    config:
      database_url: "__DB_URL__"
      pool_size_min: 2
      pool_size_max: 8
      connection_timeout: "10s"

  # Emitter instance: delivers records to the gateway via REST.
  # Gateway instance: this section is present but the module is not compiled in
  # for the gateway binary.
  usage-collector-rest-client:
    database:
      server: "sqlite_users"
      file: "usage_collector_emitter.db"
    config:
      base_url: "__COLLECTOR_URL__"
      client_id: "usage-collector-e2e"
      client_secret: "e2e-secret"
